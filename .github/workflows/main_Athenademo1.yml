name: Build and Deploy to Azure App Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: athena-combined-dev
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.9'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'Athena_backend/requirements.txt'

      # Build frontend
      - name: Build React frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          REACT_APP_API_BASE_URL: 'http://localhost:8000'
          CI: false

      # Prepare backend artifact with frontend static files
      - name: Prepare backend artifact with frontend
        run: |
          # Copy backend files
          mkdir -p deploy/Athena_backend
          cp -r Athena_backend/* deploy/Athena_backend/
          
          # Copy frontend build as static files
          mkdir -p deploy/Athena_backend/static
          cp -r frontend/build/* deploy/Athena_backend/static/
          
          # Copy startup configuration
          mkdir -p deploy/Athena_backend
          cat > deploy/Athena_backend/startup.sh << 'EOF'
          #!/bin/bash
          pip install -r requirements.txt
          python -m uvicorn api.main:app --host 0.0.0.0 --port 8000
          EOF
          chmod +x deploy/Athena_backend/startup.sh
          
          # Create runtime.txt for App Service
          echo "python-3.9" > deploy/Athena_backend/runtime.txt

      # Run backend tests (optional, can be skipped on PR)
      - name: Run backend tests
        if: github.event_name == 'push'
        working-directory: ./Athena_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          python -m pytest tests/test_api_main.py -v || true

      # Authenticate to Azure before deployment.
      - name: Azure login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy to Azure App Service
      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/deploy/Athena_backend

      # Health check post-deployment
      - name: Health check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for app to be ready..."
          sleep 10
          curl -f https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health || echo "Health check pending"
        continue-on-error: true

      # Upload artifact for reference
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-app
          path: deploy/Athena_backend/
          retention-days: 5
