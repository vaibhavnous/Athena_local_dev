name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'Athena_backend/**'
      - '.github/workflows/main_Athenademo1.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Athena_backend/**'
      - '.github/workflows/main_Athenademo1.yml'

env:
  AZURE_WEBAPP_NAME: Athenademo1
  AZURE_WEBAPP_URL: 'https://athenademo1-a6awbcchgxcchraj.southindia-01.azurewebsites.net'
  PYTHON_VERSION: '3.10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'Athena_backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: ./Athena_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        if: github.event_name == 'push'
        working-directory: ./Athena_backend
        run: |
          python -m pytest tests/test_api_main.py -v || true

      - name: Prepare backend artifact
        run: |
          mkdir -p deploy/Athena_backend
          cp -r Athena_backend/* deploy/Athena_backend/
          chmod +x deploy/Athena_backend/startup.sh

      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy/Athena_backend

      - name: Health check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for app to be ready..."
          sleep 15
          curl -f ${{ env.AZURE_WEBAPP_URL }}/health

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: deploy/Athena_backend/
          retention-days: 5
