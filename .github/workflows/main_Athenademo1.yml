name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'Athena_backend/**'
      - '.github/workflows/main_Athenademo1.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Athena_backend/**'
      - '.github/workflows/main_Athenademo1.yml'

concurrency:
  group: backend-appservice-athenademo1-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: Athenademo1
  AZURE_WEBAPP_URL: 'https://athenademo1-a6awbcchgxcchraj.southindia-01.azurewebsites.net'
  PYTHON_VERSION: '3.10'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'Athena_backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: ./Athena_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        if: github.event_name == 'push'
        working-directory: ./Athena_backend
        run: |
          python -m pytest tests/test_api_main.py -v || true

      - name: Prepare backend artifact
        run: |
          mkdir -p deploy/Athena_backend
          rsync -av \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude 'tests' \
            --exclude 'uploads' \
            --exclude 'generated_code' \
            --exclude 'pipeline_logs.json' \
            --exclude 'pipeline_logs.json.localbackup' \
            Athena_backend/ deploy/Athena_backend/
          chmod +x deploy/Athena_backend/startup.sh

      - name: Build Kudu credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profiles = [
              p for p in root.findall("publishProfile")
              if p.get("publishMethod") in {"ZipDeploy", "MSDeploy"}
          ]
          profile = profiles[0] if profiles else root.find("publishProfile")
          publish_url = (profile.get("publishUrl") or "").strip()
          if not publish_url.startswith("https://"):
              publish_url = f"https://{publish_url}"
          print(f"KUDU_URL={publish_url.rstrip('/')}")
          print(f"KUDU_USER={profile.get('userName') or ''}")
          print(f"KUDU_PASS={profile.get('userPWD') or ''}")
          PY

      - name: Create backend zip package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: deploy/Athena_backend
        run: zip -qr ../backend.zip .

      - name: Wait for any previous App Service deployment lock
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: sleep 90

      - name: Deploy backend with Kudu ZIP deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "ZIP deploy attempt ${attempt}/3"
            response_file="/tmp/kudu-deploy-${attempt}.json"
            status="$(curl -sS -u "$KUDU_USER:$KUDU_PASS" \
              -o "$response_file" \
              -w "%{http_code}" \
              --connect-timeout 30 \
              --max-time 120 \
              -X POST \
              --data-binary @deploy/backend.zip \
              "$KUDU_URL/api/zipdeploy?isAsync=true" || true)"
            echo "Kudu ZIP deploy returned HTTP ${status}"
            cat "$response_file" || true

            if [ "$status" = "200" ] || [ "$status" = "202" ]; then
              break
            fi

            if [ "$attempt" = "3" ]; then
              echo "Kudu ZIP deploy did not accept the package."
              exit 1
            fi

            sleep $((attempt * 120))
          done

          echo "Waiting for Kudu deployment completion..."
          for poll in {1..60}; do
            curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest" -o /tmp/kudu-latest.json || true
            cat /tmp/kudu-latest.json || true
            status="$(python - <<'PY'
          import json
          try:
              print(json.load(open('/tmp/kudu-latest.json')).get('status', ''))
          except Exception:
              print('')
          PY
          )"
            if [ "$status" = "4" ]; then
              echo "Kudu deployment completed successfully."
              exit 0
            fi
            if [ "$status" = "3" ]; then
              echo "Kudu deployment failed."
              exit 1
            fi
            sleep 10
          done

          echo "Kudu deployment did not complete in time."
          exit 1

      - name: Health check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for app to be ready..."
          for attempt in {1..30}; do
            : > /tmp/health-body.txt
            status="$(curl -sS -o /tmp/health-body.txt -w "%{http_code}" --connect-timeout 10 --max-time 30 "${{ env.AZURE_WEBAPP_URL }}/health" || true)"
            echo "Attempt ${attempt}/30 returned HTTP ${status}"
            if [ "$status" = "200" ]; then
              cat /tmp/health-body.txt
              exit 0
            fi
            if [ -s /tmp/health-body.txt ]; then
              cat /tmp/health-body.txt
            fi
            sleep 20
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Collect App Service diagnostics
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY' > /tmp/kudu-env.sh
          import os
          import shlex
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profiles = [
              p for p in root.findall("publishProfile")
              if p.get("publishMethod") in {"ZipDeploy", "MSDeploy"}
          ]
          profile = profiles[0] if profiles else root.find("publishProfile")
          publish_url = (profile.get("publishUrl") or "").strip()
          if not publish_url.startswith("https://"):
              publish_url = f"https://{publish_url}"
          publish_url = publish_url.rstrip("/")
          print(f"KUDU_URL={shlex.quote(publish_url)}")
          print(f"KUDU_USER={shlex.quote(profile.get('userName') or '')}")
          print(f"KUDU_PASS={shlex.quote(profile.get('userPWD') or '')}")
          PY

          . /tmp/kudu-env.sh

          echo "::group::Latest Kudu deployment log"
          curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
          echo "::endgroup::"

          echo "::group::Runtime startup inspection"
          curl -fsS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"pwd; ls -la; test -f startup.sh && sed -n \"1,120p\" startup.sh; test -f Procfile && cat Procfile; python --version; ls -la antenv/bin/python antenv/bin/gunicorn antenv/bin/uvicorn 2>&1; tail -n 200 /home/LogFiles/default_docker.log 2>/dev/null || true; find /home/LogFiles -maxdepth 2 -type f | tail -n 20","dir":"/home/site/wwwroot"}' \
            "$KUDU_URL/api/command" || true
          echo "::endgroup::"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: deploy/Athena_backend/
          retention-days: 5
