name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:

concurrency:
  group: athena-app-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: astra-data-eecthacqb5eherhk
  AZURE_WEBAPP_URL: 'https://astra-data-eecthacqb5eherhk.southindia-01.azurewebsites.net'
  PYTHON_VERSION: '3.10'

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare small backend artifact
        run: |
          set -euo pipefail
          mkdir -p deploy/Athena_backend
          rsync -a \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude '.python_packages' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude 'tests' \
            --exclude 'uploads' \
            --exclude 'generated_code' \
            --exclude '*.zip' \
            --exclude 'pipeline_logs.json' \
            --exclude 'pipeline_logs.json.localbackup' \
            Athena_backend/ deploy/Athena_backend/
          chmod +x deploy/Athena_backend/startup.sh
          printf "%s\n" "${GITHUB_SHA}" > deploy/Athena_backend/DEPLOYED_COMMIT.txt

      - name: Validate fallback payloads
        working-directory: deploy/Athena_backend
        run: |
          set -euo pipefail
          if grep -E "^(pinecone|sentence-transformers|langchain-huggingface|torch|nvidia|cuda|triton)([<>= ]|$)" requirements.txt; then
            echo "Optional embedding dependencies are still in the deployment requirements."
            exit 1
          fi
          test -f app.py
          test -f Procfile
          test -f startup.sh
          test -f .deployment
          python - <<'PY'
          from api import demo

          bronze = demo.demo_bronze_review("run_a3f8c2")
          feeds = (bronze.get("bronze_review_artifact") or {}).get("feeds") or []
          if len(feeds) < 8:
              raise RuntimeError(f"Bronze review payload is incomplete: {len(feeds)} feeds")

          run = demo.demo_run("run_b7e1d3", include_scripts=True)
          counts = run.get("script_counts") or {}
          if counts != {"bronze": 8, "silver": 8, "gold": 6}:
              raise RuntimeError(f"Script counts are incomplete: {counts}")

          lineage = demo.demo_lineage("run_b7e1d3")
          node_ids = {node["id"] for node in lineage.get("nodes", [])}
          bad_edges = [
              edge for edge in lineage.get("edges", [])
              if edge.get("source") not in node_ids or edge.get("target") not in node_ids
          ]
          if bad_edges:
              raise RuntimeError(f"Lineage has broken edges: {len(bad_edges)}")

          print("fallback payloads ok")
          PY

      - name: Build Kudu credentials
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profiles = [
              p for p in root.findall("publishProfile")
              if p.get("publishMethod") in {"ZipDeploy", "MSDeploy"}
          ]
          profile = profiles[0] if profiles else root.find("publishProfile")
          publish_url = (profile.get("publishUrl") or "").strip()
          if not publish_url.startswith("https://"):
              publish_url = f"https://{publish_url}"
          print(f"KUDU_URL={publish_url.rstrip('/')}")
          print(f"KUDU_USER={profile.get('userName') or ''}")
          print(f"KUDU_PASS={profile.get('userPWD') or ''}")
          PY

      - name: Create backend zip package
        working-directory: deploy/Athena_backend
        run: zip -qr ../backend.zip .

      - name: Deploy backend with Kudu ZIP deploy
        run: |
          set -euo pipefail

          for attempt in 1 2; do
            echo "ZIP deploy attempt ${attempt}/2"
            response_file="/tmp/kudu-deploy-${attempt}.json"
            status="$(curl -sS -u "$KUDU_USER:$KUDU_PASS" \
              -o "$response_file" \
              -w "%{http_code}" \
              --connect-timeout 20 \
              --max-time 90 \
              -X POST \
              --data-binary @deploy/backend.zip \
              "$KUDU_URL/api/zipdeploy?isAsync=true" || true)"
            echo "Kudu ZIP deploy returned HTTP ${status}"
            cat "$response_file" || true

            if [ "$status" = "200" ] || [ "$status" = "202" ]; then
              break
            fi

            if [ "$attempt" = "2" ]; then
              echo "Kudu ZIP deploy did not accept the package."
              exit 1
            fi

            sleep 45
          done

          echo "Waiting for Kudu deployment completion..."
          for poll in {1..72}; do
            curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest" -o /tmp/kudu-latest.json || true
            status="$(python - <<'PY'
          import json
          try:
              print(json.load(open('/tmp/kudu-latest.json')).get('status', ''))
          except Exception:
              print('')
          PY
          )"
            echo "Kudu poll ${poll}/72 status=${status:-pending}"
            if [ "$status" = "4" ]; then
              echo "Kudu deployment completed successfully."
              exit 0
            fi
            if [ "$status" = "3" ]; then
              echo "Kudu deployment failed."
              curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
              exit 1
            fi
            sleep 5
          done

          echo "Kudu deployment did not complete in 6 minutes."
          curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
          exit 1

      - name: Health check
        run: |
          set -euo pipefail
          echo "Waiting for app to be ready..."
          for attempt in {1..10}; do
            status="$(curl -sS -o /tmp/health-body.txt -w "%{http_code}" --connect-timeout 5 --max-time 15 "${{ env.AZURE_WEBAPP_URL }}/health" || true)"
            echo "Health attempt ${attempt}/10 returned HTTP ${status}"
            cat /tmp/health-body.txt || true
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 6
          done
          echo "Backend did not become healthy in time."
          exit 1
