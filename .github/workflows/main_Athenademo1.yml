name: Deploy Backend to Azure App Service

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Athena_backend/**'

concurrency:
  group: athena-app-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: Athenademo1
  AZURE_WEBAPP_URL: 'https://athenademo1-a6awbcchgxcchraj.southindia-01.azurewebsites.net'
  PYTHON_VERSION: '3.10'

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'Athena_backend/requirements.txt'

      - name: Install backend dependencies for tests
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: '1'
        run: |
          python -m pip install -r Athena_backend/requirements.txt

      - name: Run backend tests
        working-directory: ./Athena_backend
        run: |
          python -m pytest tests/test_api_main.py -v || true

      - name: Prepare backend artifact
        run: |
          mkdir -p deploy/Athena_backend
          rsync -av \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude '.python_packages' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude 'tests' \
            --exclude 'uploads' \
            --exclude 'pipeline_logs.json' \
            --exclude 'pipeline_logs.json.localbackup' \
            Athena_backend/ deploy/Athena_backend/
          chmod +x deploy/Athena_backend/startup.sh

      - name: Validate backend artifact
        run: |
          set -euo pipefail
          if grep -E "^(pinecone|sentence-transformers|langchain-huggingface|torch|nvidia|cuda|triton)([<>= ]|$)" deploy/Athena_backend/requirements.txt; then
            echo "Default deployment artifact contains optional embedding dependencies."
            exit 1
          fi
          test -f deploy/Athena_backend/app.py
          test -f deploy/Athena_backend/Procfile
          test -f deploy/Athena_backend/startup.sh
          test ! -d deploy/Athena_backend/.python_packages
          grep -q "SCM_DO_BUILD_DURING_DEPLOYMENT=true" deploy/Athena_backend/.deployment
          printf "%s\n" "${GITHUB_SHA}" > deploy/Athena_backend/DEPLOYED_COMMIT.txt

      - name: Smoke test packaged backend imports
        working-directory: deploy/Athena_backend
        run: |
          set -euo pipefail
          python - <<'PY'
          import importlib

          for module_name in ("api.main", "app"):
              module = importlib.import_module(module_name)
              if getattr(module, "app", None) is None:
                  raise RuntimeError(f"{module_name}:app is missing")
              print(f"{module_name}:app import ok")
          PY

      - name: Build Kudu credentials
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profiles = [
              p for p in root.findall("publishProfile")
              if p.get("publishMethod") in {"ZipDeploy", "MSDeploy"}
          ]
          profile = profiles[0] if profiles else root.find("publishProfile")
          publish_url = (profile.get("publishUrl") or "").strip()
          if not publish_url.startswith("https://"):
              publish_url = f"https://{publish_url}"
          print(f"KUDU_URL={publish_url.rstrip('/')}")
          print(f"KUDU_USER={profile.get('userName') or ''}")
          print(f"KUDU_PASS={profile.get('userPWD') or ''}")
          PY

      - name: Create backend zip package
        working-directory: deploy/Athena_backend
        run: zip -qr ../backend.zip .

      - name: Wait for any previous App Service deployment lock
        run: sleep 20

      - name: Deploy backend with Kudu ZIP deploy
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "ZIP deploy attempt ${attempt}/3"
            response_file="/tmp/kudu-deploy-${attempt}.json"
            status="$(curl -sS -u "$KUDU_USER:$KUDU_PASS" \
              -o "$response_file" \
              -w "%{http_code}" \
              --connect-timeout 30 \
              --max-time 120 \
              -X POST \
              --data-binary @deploy/backend.zip \
              "$KUDU_URL/api/zipdeploy?isAsync=true" || true)"
            echo "Kudu ZIP deploy returned HTTP ${status}"
            cat "$response_file" || true

            if [ "$status" = "200" ] || [ "$status" = "202" ]; then
              break
            fi

            if [ "$attempt" = "3" ]; then
              echo "Kudu ZIP deploy did not accept the package."
              exit 1
            fi

            sleep $((attempt * 120))
          done

          echo "Waiting for Kudu deployment completion..."
          for poll in {1..180}; do
            curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest" -o /tmp/kudu-latest.json || true
            cat /tmp/kudu-latest.json || true
            status="$(python - <<'PY'
          import json
          try:
              print(json.load(open('/tmp/kudu-latest.json')).get('status', ''))
          except Exception:
              print('')
          PY
          )"
            if [ "$status" = "4" ]; then
              echo "Kudu deployment completed successfully."
              exit 0
            fi
            if [ "$status" = "3" ]; then
              echo "Kudu deployment failed."
              curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
              exit 1
            fi
            sleep 10
          done

          echo "Kudu deployment did not complete in time."
          curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
          exit 1

      - name: Verify deployed backend artifact
        run: |
          set -euo pipefail
          python - <<'PY' > /tmp/verify-payload.json
          import json

          command = r'''
          set -e
          echo "Deployed commit:"
          cat DEPLOYED_COMMIT.txt
          echo "Runtime dependency environment:"
          test -d antenv/lib || test -d antenv
          test ! -d .python_packages || echo "Stale .python_packages exists but startup ignores it"
          echo "Checking default requirements for optional embedding stack:"
          if grep -E "^(pinecone|sentence-transformers|langchain-huggingface|torch|nvidia|cuda|triton)([<>= ]|$)" requirements.txt; then
            echo "Stale or invalid requirements.txt deployed."
            exit 1
          fi
          '''
          print(json.dumps({"command": command, "dir": "/home/site/wwwroot"}))
          PY

          curl -fsS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/verify-payload.json \
            "$KUDU_URL/api/command"

      - name: Health check
        run: |
          echo "Waiting for app to be ready..."
          for attempt in {1..12}; do
            : > /tmp/health-body.txt
            status="$(curl -sS -o /tmp/health-body.txt -w "%{http_code}" --connect-timeout 5 --max-time 15 "${{ env.AZURE_WEBAPP_URL }}/health" || true)"
            echo "Attempt ${attempt}/12 returned HTTP ${status}"
            if [ "$status" = "200" ]; then
              cat /tmp/health-body.txt
              exit 0
            fi
            if [ -s /tmp/health-body.txt ]; then
              cat /tmp/health-body.txt
            fi
            sleep 10
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Collect App Service diagnostics
        if: failure()
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          python - <<'PY' > /tmp/kudu-env.sh
          import os
          import shlex
          import xml.etree.ElementTree as ET

          root = ET.fromstring(os.environ["PUBLISH_PROFILE"])
          profiles = [
              p for p in root.findall("publishProfile")
              if p.get("publishMethod") in {"ZipDeploy", "MSDeploy"}
          ]
          profile = profiles[0] if profiles else root.find("publishProfile")
          publish_url = (profile.get("publishUrl") or "").strip()
          if not publish_url.startswith("https://"):
              publish_url = f"https://{publish_url}"
          publish_url = publish_url.rstrip("/")
          print(f"KUDU_URL={shlex.quote(publish_url)}")
          print(f"KUDU_USER={shlex.quote(profile.get('userName') or '')}")
          print(f"KUDU_PASS={shlex.quote(profile.get('userPWD') or '')}")
          PY

          . /tmp/kudu-env.sh

          echo "::group::Latest Kudu deployment log"
          curl -fsS -u "$KUDU_USER:$KUDU_PASS" "$KUDU_URL/api/deployments/latest/log" || true
          echo "::endgroup::"

          echo "::group::Runtime startup inspection"
          curl -fsS -u "$KUDU_USER:$KUDU_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"pwd; ls -la; test -f startup.sh && sed -n \"1,120p\" startup.sh; test -f Procfile && cat Procfile; python --version; ls -la antenv/bin/python antenv/bin/gunicorn antenv/bin/uvicorn 2>&1; tail -n 200 /home/LogFiles/default_docker.log 2>/dev/null || true; find /home/LogFiles -maxdepth 2 -type f | tail -n 20","dir":"/home/site/wwwroot"}' \
            "$KUDU_URL/api/command" || true
          echo "::endgroup::"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: deploy/Athena_backend/
          retention-days: 5
