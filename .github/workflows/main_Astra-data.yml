name: Deploy Backend to Astra Data

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: astra-data-backend-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: astra-data-eecthacqb5eherhk
  AZURE_WEBAPP_URL: https://astra-data-eecthacqb5eherhk.southindia-01.azurewebsites.net

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend package
        run: |
          set -euo pipefail
          mkdir -p deploy
          rsync -a Athena_backend/ deploy/Backend/ \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude 'tests' \
            --exclude 'uploads' \
            --exclude 'generated_code' \
            --exclude '*.zip'
          chmod +x deploy/Backend/startup.sh
          cd deploy/Backend
          zip -qr ../backend.zip .

      - name: Deploy to Astra Data App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy/backend.zip

      - name: Verify backend health
        run: |
          set -euo pipefail
          for attempt in {1..10}; do
            status="$(curl -sS -o /tmp/health-body.txt -w '%{http_code}' \
              --connect-timeout 5 --max-time 15 \
              "${AZURE_WEBAPP_URL}/health" || true)"
            echo "Health attempt ${attempt}/10 returned HTTP ${status}"
            if [ "${status}" = "200" ]; then
              exit 0
            fi
            sleep 6
          done
          cat /tmp/health-body.txt || true
          exit 1
