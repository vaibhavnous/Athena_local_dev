name: Deploy Backend to Astra Data

on:
  push:
    branches:
      - main
    paths:
      - Athena_backend/**
      - .github/workflows/main_Astra-data.yml
  workflow_dispatch:

concurrency:
  group: astra-data-backend-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: Astra-data
  AZURE_WEBAPP_URL: https://astra-data-eecthacqb5eherhk.southindia-01.azurewebsites.net

jobs:
  deploy:
    name: Build and deploy backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build backend package
        run: |
          set -euo pipefail
          mkdir -p deploy
          rsync -a Athena_backend/ deploy/Backend/ \
            --exclude '.env' \
            --exclude '.venv' \
            --exclude '.pytest_cache' \
            --exclude '__pycache__' \
            --exclude 'tests' \
            --exclude 'uploads' \
            --exclude 'generated_code' \
            --exclude '*.zip'
          chmod +x deploy/Backend/startup.sh
          cd deploy/Backend
          zip -qr ../backend.zip .

      - name: Extract publish profile credentials
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          profile_xml = os.environ["AZURE_WEBAPP_PUBLISH_PROFILE"]
          root = ET.fromstring(profile_xml)
          profiles = root.findall("publishProfile")
          profile = next(
              (item for item in profiles if item.get("publishMethod") == "ZipDeploy"),
              profiles[0] if profiles else None,
          )
          if profile is None:
              raise SystemExit("No publishProfile entries found")

          publish_url = profile.attrib["publishUrl"]
          if not publish_url.startswith(("http://", "https://")):
              publish_url = f"https://{publish_url}"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"KUDU_PUBLISH_URL={publish_url}\n")
              env_file.write(f"KUDU_PUBLISH_USER={profile.attrib['userName']}\n")
              env_file.write(f"KUDU_PUBLISH_PASSWORD={profile.attrib['userPWD']}\n")

          print(f"::add-mask::{profile.attrib['userName']}")
          print(f"::add-mask::{profile.attrib['userPWD']}")
          PY

      - name: Deploy to Astra Data App Service
        run: |
          set -euo pipefail
          curl -sS --fail-with-body \
            -u "${KUDU_PUBLISH_USER}:${KUDU_PUBLISH_PASSWORD}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy/backend.zip \
            "${KUDU_PUBLISH_URL%/}/api/zipdeploy?isAsync=false"

      - name: Verify backend health
        run: |
          set -euo pipefail
          for attempt in {1..10}; do
            status="$(curl -sS -o /tmp/health-body.txt -w '%{http_code}' \
              --connect-timeout 5 --max-time 15 \
              "${AZURE_WEBAPP_URL}/health" || true)"
            echo "Health attempt ${attempt}/10 returned HTTP ${status}"
            if [ "${status}" = "200" ]; then
              exit 0
            fi
            sleep 6
          done
          cat /tmp/health-body.txt || true
          exit 1
