name: Deploy Frontend to Astradata

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/azure-static-web-apps-black-sand-013f9d900.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: astradata-frontend-production
  cancel-in-progress: true

env:
  REACT_APP_API_BASE_URL: https://astra-data-eecthacqb5eherhk.southindia-01.azurewebsites.net
  REACT_APP_ENABLE_DEMO_FALLBACKS: "false"

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --watchAll=false --runInBand

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify Static Web App deployment token
        env:
          DEPLOYMENT_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SAND_013F9D900 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASTRADATA || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "${DEPLOYMENT_TOKEN}" ]; then
            echo "::error::Add the Static Web App deployment token as a GitHub Actions repository secret named AZURE_STATIC_WEB_APPS_API_TOKEN_ASTRADATA."
            exit 1
          fi

      - name: Deploy to Astradata Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SAND_013F9D900 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASTRADATA || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/build
          api_location: ""
          output_location: ""
          skip_app_build: true
