name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    env:
      REACT_APP_API_BASE_URL: https://athenademo1-a6awbcchgxcchraj.southindia-01.azurewebsites.net
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: false
          lfs: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend with backend API URL
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend bundle points to backend
        working-directory: ./frontend
        run: |
          set -euo pipefail
          grep -R "athenademo1-a6awbcchgxcchraj.southindia-01.azurewebsites.net" build/static/js

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_MUD_0ABCA9A00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./frontend/build" # Pre-built app content path
          api_location: "" # Api source code path - optional
          output_location: "" # Build already produced by npm run build
          skip_app_build: true
          ###### End of Repository/Build Configurations ######
