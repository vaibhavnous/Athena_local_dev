    body {

      min-height: 100vh;
    }
    .shell {
      width: min(1100px, calc(100vw - 32px));
      margin: 32px auto;
      background: rgba(255, 250, 243, 0.9);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero {

      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(255, 250, 243, 0.92)),

    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 40px);
      letter-spacing: -0.04em;
    }
    .sub {
      color: var(--muted);
      margin: 0;
      max-width: 760px;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 14px;
      padding: 20px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.45);
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fffdf9;
      color: var(--ink);
      font: inherit;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }
    .list {
      padding: 24px 32px 32px;
      display: grid;
      gap: 16px;
    }
    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      display: grid;
      gap: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      flex-wrap: wrap;
    }
    .source {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .target {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .tag {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .empty {
      display: none;
      padding: 8px 32px 32px;
      color: var(--muted);
    }

      });

      list.innerHTML = filtered.map((row) => `
        <article class="card">
          <div class="row">
            <div>
              <p class="source">${row.source}</p>
              <p class="target">Target: ${row.target}</p>
            </div>
            <span class="tag">${row.status}</span>
          </div>
          <pre style="margin:0; overflow:auto; background:#fffdf9; border:1px solid var(--line); border-radius:14px; padding:16px; font-size:13px; line-height:1.5;"><code>${escapeHtml(row.script_body)}</code></pre>
        </article>
      `).join("");

      empty.style.display = filtered.length ? "none" : "block";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    search.addEventListener("input", render);
    status.addEventListener("change", render);
    render();
  </script>
</body>
</html>
