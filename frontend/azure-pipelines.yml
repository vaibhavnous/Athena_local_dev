trigger:
  branches:
    include:
      - qa

pr: none  # don't run on PR creation, only after merge to qa

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  azureServiceConnection: 'RG-DataEdge-QA'
  staticWebAppName: 'athena-app-qa'
  # AZURE_STATIC_WEB_APPS_API_TOKEN must be added as a secret pipeline variable
  # Obtain it from: Azure Portal -> Static Web App (athena-app-qa) -> Manage deployment token

stages:
# -------------------- CI / BUILD --------------------
- stage: Build
  displayName: Build & Test (QA branch)
  jobs:
  - job: build
    displayName: Build
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: Install dependencies

    - script: npm run build
      displayName: Build React App
      env:
        CI: false  # prevents CRA from treating warnings as errors
        REACT_APP_API_BASE_URL: $(REACT_APP_API_BASE_URL)

    - publish: '$(System.DefaultWorkingDirectory)/build'
      artifact: drop


# -------------------- CD to QA (MANUAL) --------------------
- stage: Deploy_QA
  displayName: Deploy to QA (manual)
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: deployQa
    displayName: Deploy QA
    environment: QA   # <-- approval/checks configured on this Environment
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: drop
              targetPath: '$(System.DefaultWorkingDirectory)/drop'

          - task: AzureStaticWebApp@0
            inputs:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
              app_location: 'drop'
              output_location: ''
              skip_app_build: true
