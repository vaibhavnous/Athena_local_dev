trigger: none

pr: none

resources:
  pipelines:
  - pipeline: BackendBuild
    source: 'Athena-Backend-CI'
    trigger:
      branches:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  resourceGroupName: 'athena-rg-$(environment)'
  location: 'eastus'
  subscriptionId: '$(AZURE_SUBSCRIPTION_ID)'
  environment: 'dev'
  keyVaultName: 'athena-kv-$(environment)'
  appName: 'athena-combined-$(environment)'

stages:
- stage: DeployInfrastructure
  displayName: 'Deploy Infrastructure'
  jobs:
  - job: DeployBicep
    displayName: 'Deploy Bicep Template'
    steps:
    - checkout: self
      displayName: 'Checkout repo'

    - task: AzureResourceManagerTemplateDeployment@3
      inputs:
        deploymentScope: 'Resource Group'
        azureResourceManagerConnection: '$(AZURE_DEVOPS_SERVICE_CONNECTION)'
        subscriptionId: '$(subscriptionId)'
        action: 'Create'
        resourceGroupName: '$(resourceGroupName)'
        location: '$(location)'
        templateLocation: 'Linked artifact'
        csmFile: 'infrastructure.bicep'
        csmParametersFile: 'infrastructure.parameters.json'
        deploymentMode: 'Incremental'
        overrideParameters: '-projectName athena -environment $(environment)'
      displayName: 'Deploy infrastructure.bicep'

- stage: DeployApp
  displayName: 'Deploy Combined App Service'
  dependsOn: DeployInfrastructure
  condition: succeeded()
  jobs:
  - job: DeployAppService
    displayName: 'Deploy Backend + Frontend'
    steps:
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: 'Athena-Backend-CI'
        buildVersionToDownload: 'latest'
        artifactName: 'backend-app'
        targetPath: '$(Pipeline.Workspace)/app'
      displayName: 'Download combined artifact'

    - task: AzureWebApp@1
      inputs:
        azureSubscription: '$(AZURE_DEVOPS_SERVICE_CONNECTION)'
        appType: 'webAppLinux'
        appName: '$(appName)'
        deployToSlotOrASE: true
        resourceGroupName: '$(resourceGroupName)'
        slotName: 'staging'
        package: '$(Pipeline.Workspace)/app'
        runtimeStack: 'PYTHON|3.10'
        startupCommand: 'bash startup.sh'
      displayName: 'Deploy to staging slot'

    - task: AzureAppServiceManage@0
      inputs:
        azureSubscription: '$(AZURE_DEVOPS_SERVICE_CONNECTION)'
        appType: 'webAppLinux'
        action: 'Swap Slots'
        appName: '$(appName)'
        resourceGroupName: '$(resourceGroupName)'
        sourceSlot: 'staging'
        swapWithProduction: true
      displayName: 'Swap staging to production'

    - task: AzureCLI@2
      inputs:
        azureSubscription: '$(AZURE_DEVOPS_SERVICE_CONNECTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # Configure app settings with Key Vault references
          az webapp config appsettings set \
            --resource-group $(resourceGroupName) \
            --name $(appName) \
            --settings \
              SQL_CONNECTION_STRING="@Microsoft.KeyVault(VaultName=$(keyVaultName);SecretName=sql-connection-string)" \
              API_KEY="@Microsoft.KeyVault(VaultName=$(keyVaultName);SecretName=api-key)" \
              ATHENA_CORS_ORIGINS="http://localhost:3000,http://127.0.0.1:3000,https://ashy-mud-0abca9a00.7.azurestaticapps.net" \
              ENVIRONMENT="$(environment)" \
              LOG_LEVEL="INFO" \
              PYTHONUNBUFFERED="1"
      displayName: 'Configure app settings'

- stage: PostDeploy
  displayName: 'Post-Deployment Checks'
  dependsOn: DeployApp
  condition: succeeded()
  jobs:
  - job: HealthCheck
    displayName: 'Health Check'
    steps:
    - script: |
        echo "Checking backend health..."
        curl -f https://$(appName).azurewebsites.net/health || echo "Backend health check pending"
        
        echo "Checking frontend..."
        curl -f https://$(appName).azurewebsites.net || echo "Frontend check pending"
      displayName: 'Verify deployment'
      continueOnError: true
